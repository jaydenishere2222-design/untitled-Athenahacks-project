<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatigue Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }


    body {
      background: #111;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }


    .video-wrapper { position: relative; display: inline-block; }


    #webcam {
      display: block;
      width: 640px;
      height: 480px;
      border-radius: 8px;
      background: #000;
    }


    /* Alert overlay */
    #alert-box {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 8px;
      background: rgba(180, 60, 20, 0.88);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 24px;
    }
    #alert-box.show  { display: flex; }
    #alert-title     { font-size: 22px; font-weight: 600; color: #fff; }
    #alert-advice    { font-size: 14px; color: rgba(255,255,255,0.85); max-width: 400px; line-height: 1.6; }
    #alert-dismiss   {
      margin-top: 8px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #alert-dismiss:hover { background: rgba(255,255,255,0.25); }


    /* Status bar */
    #status-bar {
      display: flex;
      gap: 24px;
      align-items: center;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 10px 20px;
      width: 640px;
    }
    .stat              { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-label        { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value        { font-size: 16px; font-weight: 500; color: #fff; }


    #state-badge {
      margin-left: auto;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 14px;
      border-radius: 20px;
      background: #2a2a2a;
      color: #aaa;
    }
    #state-badge.normal     { background: #0f6e56; color: #9FE1CB; }
    #state-badge.drowsy     { background: #854F0B; color: #FAC775; }
    #state-badge.stressed   { background: #993C1D; color: #F5C4B3; }
    #state-badge.anxious    { background: #534AB7; color: #CECBF6; }


    #conn-status { font-size: 12px; color: #555; }
    #conn-status.ok  { color: #1D9E75; }
    #conn-status.err { color: #E24B4A; }
  </style>
</head>
<body>


  <div class="video-wrapper">
    <video id="webcam" autoplay playsinline></video>
    <div id="alert-box">
      <div id="alert-title">Warning</div>
      <div id="alert-advice"></div>
      <button id="alert-dismiss" onclick="dismissAlert()">I'm okay — dismiss</button>
    </div>
  </div>


  <div id="status-bar">
    <div class="stat">
      <span class="stat-label">Pulse</span>
      <span class="stat-value" id="stat-pulse">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Breathing</span>
      <span class="stat-value" id="stat-breathing">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Alerts today</span>
      <span class="stat-value" id="stat-alerts">0</span>
    </div>
    <span id="state-badge">Waiting...</span>
  </div>


  <div id="conn-status">Connecting to server...</div>


  <script>
    const SERVER     = 'http://localhost:5000';
    let alertCount   = 0;
    let isAlerting   = false;


    // ── Webcam (display only — Presage reads from its own camera feed) ────────
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { document.getElementById('webcam').srcObject = stream; })
      .catch(() => { document.getElementById('conn-status').textContent = 'Camera not available'; });


    // ── Poll Flask every 2 seconds ────────────────────────────────────────────
    async function pollState() {
      try {
        const res  = await fetch(`${SERVER}/api/state`);
        const data = await res.json();


        document.getElementById('conn-status').textContent = 'Server connected';
        document.getElementById('conn-status').className   = 'ok';


        // Update stats
        document.getElementById('stat-pulse').textContent =
          data.pulse_bpm ? data.pulse_bpm + ' bpm' : '—';
        document.getElementById('stat-breathing').textContent =
          data.breathing_bpm ? data.breathing_bpm + ' bpm' : '—';


        // Update state badge
        const state = data.state || 'normal';
        const badge = document.getElementById('state-badge');
        badge.textContent = state.charAt(0).toUpperCase() + state.slice(1);
        badge.className   = state;


        // Trigger alert
        if (data.alert_triggered && !isAlerting) {
          showAlert(state, data.advice);
        }


      } catch (err) {
        document.getElementById('conn-status').textContent = 'Cannot reach server — is Flask running?';
        document.getElementById('conn-status').className   = 'err';
      }
    }


    setInterval(pollState, 2000);
    pollState();


    // ── Alert ─────────────────────────────────────────────────────────────────
    function showAlert(state, advice) {
      isAlerting = true;
      alertCount++;
      document.getElementById('stat-alerts').textContent = alertCount;


      const titles = {
        drowsy:   'You look drowsy',
        stressed: 'High stress detected',
        anxious:  'Anxiety detected',
      };


      document.getElementById('alert-title').textContent  = titles[state] || 'Attention needed';
      document.getElementById('alert-advice').textContent = advice || 'Please take a short break.';
      document.getElementById('alert-box').classList.add('show');
      playChime();
      setTimeout(dismissAlert, 15000);
    }


    function dismissAlert() {
      document.getElementById('alert-box').classList.remove('show');
      isAlerting = false;
    }


    // ── Chime ─────────────────────────────────────────────────────────────────
    function playChime() {
      try {
        const ctx  = new AudioContext();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 520;
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 1.2);
      } catch (e) {}
    }
  </script>


</body>
</html>
